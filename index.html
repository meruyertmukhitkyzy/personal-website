    * {

    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100svh;
    }

    body {
      background-image: url("./landing/background.png");

      background-position: center;
      background-repeat: repeat;
      font-family: Arial, sans-serif;

      display: grid;
      place-items: center;

      overflow: hidden;
    }

    .landing-page {
      width: min(100vw, calc(100svh * 1.88));
      aspect-ratio: 1.88 / 1;
      position: relative;
      overflow: hidden;
    }

    .landing-page img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
    }

    .item {
      position: absolute;
    }

    .item a,
    a.item {
      display: block;
    }

    a.item:hover {
      cursor: pointer;
      transform: rotate(var(--hover-rotate, 0deg)) scale(1.03);
    }

      top: 0;
      left: 0;

      z-index: 1;
